<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7ede2" />
      <stop offset="100%" stop-color="#ce9e78" />
    </linearGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0" result="mono" />
      <feComposite in="mono" in2="SourceGraphic" operator="in" result="mask" />
      <feBlend in="SourceGraphic" in2="mask" mode="multiply" />
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)" />
  <g filter="url(#grain)" opacity="0.25">
    <path d="M180 220c180 100 280 30 420-40s260-20 420 90" fill="none" stroke="#8c6c52" stroke-width="36" stroke-linecap="round" />
    <path d="M150 320c210 120 310 90 460-20s250-40 420 40" fill="none" stroke="#9b7a60" stroke-width="28" stroke-linecap="round" />
    <path d="M120 440c220 140 340 100 500-40s260-10 430 70" fill="none" stroke="#8a6d55" stroke-width="24" stroke-linecap="round" />
  </g>
  <circle cx="900" cy="240" r="160" fill="#d99f78" opacity="0.65" />
  <rect x="360" y="120" width="620" height="620" rx="40" fill="#ffffff" fill-opacity="0.05" />
  <g opacity="0.75" stroke="#ffffff" stroke-width="22" stroke-linecap="round" fill="none">
    <path d="M460 250c100 110 150 120 260 80" />
    <path d="M520 330c80 120 150 100 220 60" />
    <path d="M540 420c70 90 120 80 190 50" />
  </g>
  <text x="50%" y="82%" text-anchor="middle" fill="#47322e" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700">Dennis Hair Detail</text>
</svg>
